# Docker / local reverse proxy — Cloudflare Origin CA paths on EC2 hosts.
# See contact360.io/cloundflare/ssl/README.md

upstream contact360_app {
    server localhost:3000;
    keepalive 32;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name app.contact360.io 32.197.236.59;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;

    server_name app.contact360.io;

    ssl_certificate     /etc/nginx/ssl/cloudflare/contact360.io-origin.pem;
    ssl_certificate_key /etc/nginx/ssl/cloudflare/contact360.io-origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/rss+xml application/atom+xml image/svg+xml;

    location /_next/static/ {
        proxy_pass http://contact360_app;
        add_header Cache-Control "public, max-age=31536000, immutable";
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location /public/ {
        proxy_pass http://contact360_app;
        add_header Cache-Control "public, max-age=86400";
    }

    location / {
        proxy_pass http://contact360_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
}
