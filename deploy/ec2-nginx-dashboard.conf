# Nginx Configuration for Contact360 Dashboard
#
# Before use:
#   1. Replace server_name with your domain and EC2 public IP (e.g. app.contact360.io and 54.160.179.222)
#   2. Place at: /etc/nginx/sites-available/app
#   3. Enable: sudo ln -s /etc/nginx/sites-available/app /etc/nginx/sites-enabled/
#   4. Test: sudo nginx -t
#   5. Reload: sudo systemctl reload nginx

# Map for WebSocket connection upgrade (important for AI chat)
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    # Replace with your domain and EC2 IP (e.g. app.contact360.io dashboard.contact360.io 54.160.179.222)
    server_name app.contact360.io dashboard.contact360.io 54.160.179.222;

    # Increase body size limit for file uploads (contacts, companies, etc.)
    client_max_body_size 50M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    # Proxy to Next.js dashboard application (port 3000)
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;

        # WebSocket support (critical for AI chat and real-time features)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Cache bypass for WebSocket and dynamic content
        proxy_cache_bypass $http_upgrade;

        # Buffering settings for better performance
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;

        # Timeouts (increased for long-running requests like AI chat)
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;  # Increased for AI chat responses
        proxy_read_timeout 300s;  # Increased for AI chat responses

        # Don't pass the request body to the upstream if it's too large
        client_body_buffer_size 128k;
    }

    # Cache static assets from Next.js (Next.js 15/16 App Router)
    location /_next/static/ {
        proxy_pass http://localhost:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, immutable, max-age=31536000";
        expires 1y;
        access_log off;
    }

    # Cache Next.js image optimization
    location /_next/image {
        proxy_pass http://localhost:3000;
        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, max-age=604800";
        expires 7d;
    }

    # Cache favicon and other static files
    location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|woff|woff2|ttf|eot)$ {
        proxy_pass http://localhost:3000;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=2592000";
        expires 30d;
        access_log off;
    }

    # Health check endpoint (if available)
    location /health {
        proxy_pass http://localhost:3000;
        access_log off;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Logging
    access_log /var/log/nginx/app-access.log;
    error_log /var/log/nginx/app-error.log;
}
