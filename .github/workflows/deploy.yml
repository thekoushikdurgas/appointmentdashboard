# Use this file ONLY if this directory is the Git repository root (standalone dashboard repo).
# For the Contact360 monorepo, GitHub runs: repo_root/.github/workflows/deploy-contact360-app.yml

name: Deploy Contact360 App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Deploy via SSH (PM2 + deploy/ec2-github-deploy.sh)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          command_timeout: 40m
          script: |
            set -e
            APP_DIR="${{ vars.EC2_APP_PATH }}"
            if [ -z "$APP_DIR" ]; then APP_DIR="$HOME/appointmentdashboard"; fi
            cd "$APP_DIR"
            BRANCH="${{ github.ref_name }}"
            git fetch origin "$BRANCH"
            git reset --hard "origin/$BRANCH"
            # Production env for next build + next start (see deploy/README.md)
            echo "NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}" > .env.production
            echo "NEXT_PUBLIC_GRAPHQL_URL=${{ secrets.NEXT_PUBLIC_GRAPHQL_URL }}" >> .env.production
            echo "NEXT_PUBLIC_JOBS_S3_BUCKET=${{ secrets.NEXT_PUBLIC_JOBS_S3_BUCKET }}" >> .env.production
            chmod 600 .env.production
            export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:${PATH:-}"
            export SKIP_DB_CHECK=1
            bash deploy/ec2-github-deploy.sh
            sudo chmod +x deploy/ec2-setup.sh
            sudo ./deploy/ec2-setup.sh
            sudo chmod +x deploy/ec2-deploy.sh
            sudo ./deploy/ec2-deploy.sh
      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e
            curl -sf --connect-timeout 15 http://127.0.0.1:3000/ || exit 1
