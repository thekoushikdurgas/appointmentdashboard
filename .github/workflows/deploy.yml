name: Deploy Contact360 App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd "$HOME/appointmentdashboard"
            BRANCH="${{ github.ref_name }}"
            git fetch origin "$BRANCH"
            git reset --hard "origin/$BRANCH"
            echo "NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}" > .env.local
            echo "NEXT_PUBLIC_GRAPHQL_URL=${{ secrets.NEXT_PUBLIC_GRAPHQL_URL }}" >> .env.local
            echo "NEXT_PUBLIC_JOBS_S3_BUCKET=${{ secrets.NEXT_PUBLIC_JOBS_S3_BUCKET }}" >> .env.local
            export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:${PATH:-}"
            run_docker() {
              if command -v docker >/dev/null 2>&1; then
                docker "$@"
              elif [ -x /usr/bin/docker ]; then
                /usr/bin/docker "$@"
              elif sudo test -x /usr/bin/docker 2>/dev/null; then
                sudo /usr/bin/docker "$@"
              else
                echo "ERROR: Docker is not installed on this EC2 host (no docker on PATH, not at /usr/bin/docker)." >&2
                echo "Install Engine + Compose plugin, then re-run deploy. Example (Ubuntu):" >&2
                echo "  curl -fsSL https://get.docker.com | sudo sh" >&2
                echo "  sudo apt-get update && sudo apt-get install -y docker-compose-plugin" >&2
                echo '  sudo usermod -aG docker $USER   # optional; log out/in so docker works without sudo' >&2
                exit 127
              fi
            }
            # Stop/remove previous stack so host port 3000 is free (avoids "address already in use")
            run_docker compose -f docker-compose.prod.yml down --remove-orphans
            run_docker compose -f docker-compose.prod.yml up --build -d
            run_docker image prune -f
            echo "Deployment complete: $(date)"

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e
            curl -sf --connect-timeout 15 http://127.0.0.1:3000/ || exit 1
